name: Go Test Suite

on:
  push:
    branches:
      - main
      - dev
      - feat/mcp-extract
  pull_request:
    branches:
      - main
      - dev
      - feat/mcp-extract

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: go get -v ./...

      - name: Run unit tests
        run: go test -v ./...
